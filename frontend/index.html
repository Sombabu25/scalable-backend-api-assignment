<!DOCTYPE html>
<html>
<head>
  <title>Task Management System</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; }
    .container { max-width: 400px; margin: 0 auto; }
    .form-group { margin-bottom: 15px; }
    input { width: 100%; padding: 8px; margin-top: 5px; }
    button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; cursor: pointer; }
    button:hover { background-color: #0056b3; }
    .toggle-form { text-align: center; margin-top: 15px; }
    .error { color: red; margin-top: 10px; }
    .success { color: green; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Task Management System</h1>
    
    <!-- Login Form -->
    <div id="loginForm">
      <h2>Login</h2>
      <div class="form-group">
        <input id="loginEmail" placeholder="Email" type="email">
      </div>
      <div class="form-group">
        <input id="loginPassword" type="password" placeholder="Password">
      </div>
      <button onclick="login()">Login</button>
      <div id="loginMessage" class="error"></div>
      <div class="toggle-form">
        <p>Don't have an account? <a href="#" onclick="toggleForm()">Register here</a></p>
      </div>
    </div>

    <!-- Registration Form -->
    <div id="registerForm" style="display: none;">
      <h2>Register</h2>
      <div class="form-group">
        <input id="registerEmail" placeholder="Email" type="email">
      </div>
      <div class="form-group">
        <input id="registerPassword" type="password" placeholder="Password">
      </div>
      <button onclick="register()">Register</button>
      <div id="registerMessage" class="error"></div>
      <div class="toggle-form">
        <p>Already have an account? <a href="#" onclick="toggleForm()">Login here</a></p>
      </div>
    </div>
  </div>

  <script src="app.js?v=2"></script>
</body>
</html>
